<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OlympoPay - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

  <main class="login-card">
    <div class="brand">OLYMPO<span>PAY</span></div>
    <p class="subtitle">Player Payment System</p>

    <input id="email" type="email" placeholder="Email do player">
    <input id="password" type="password" placeholder="Senha">

    <button onclick="login()">Entrar no portal</button>

    <p class="small">Acesso restrito para membros autorizados da OLYMPO.</p>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
