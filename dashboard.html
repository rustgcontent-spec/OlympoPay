<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - OlympoPay</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="logo">OLYMPO<span>PAY</span></div>

    <a class="active" onclick="showSection('dashboard')">Dashboard</a>
    <a onclick="showSection('pagamentos')">Pagamentos</a>
    <a onclick="showSection('contrato')">Contrato</a>
    <a onclick="showSection('avisos')">Avisos</a>
    <a onclick="showSection('admin')" id="adminBtn" style="display:none;">Admin</a>

    <button onclick="logout()" class="logout">Sair</button>
  </aside>

  <main class="dashboard">
    <section class="top">
      <div>
        <p class="label">Bem-vindo de volta</p>
        <h1 id="playerName">Player</h1>
      </div>
      <div id="statusBadge" class="badge">Carregando</div>
    </section>

    <section class="grid">
      <div class="card main-card">
        <p class="label">Pagamento atual</p>
        <h2 id="paymentStatus">---</h2>
        <p id="paymentText">---</p>
      </div>

      <div class="card">
        <p class="label">Valor</p>
        <h2 id="paymentValue">---</h2>
      </div>

      <div class="card">
        <p class="label">Vencimento</p>
        <h2 id="paymentDue">---</h2>
      </div>

      <div class="card">
        <p class="label">Contrato</p>
        <h2 id="contractStatus">---</h2>
      </div>
    </section>

    <section class="content">
      <div class="card">
        <h3>Histórico de pagamentos</h3>
        <div id="history"></div>
      </div>

      <div class="card">
        <h3>Aviso da staff</h3>
        <p id="staffMessage" class="message">---</p>
      </div>
    </section>

    <section class="content-single">
      <div class="card full-card" id="dynamicContent">Carregando...</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
